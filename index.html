<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Opportunities Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        html, body { 
            overflow: hidden !important; 
            overflow-x: hidden !important;
            width: 100%;
            height: 100%;
        }

        #map { height: 100%; width: 100%; z-index: 1; }
        
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #111827 !important;
            color: #f3f4f6 !important;
            font-family: "Plus Jakarta Sans", sans-serif;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
            border: none !important;
        }
        .leaflet-div-icon {
            background: transparent !important;
            border: none !important;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-pane {
            animation: textFadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes textFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .apple-transition {
            transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease !important;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans relative w-full h-full">

   <div class="absolute top-4 left-1/2 -translate-x-1/2 z-[1000] w-[90%] max-w-[360px] flex flex-col items-center gap-1.5">
        
        <div class="bg-gray-900/70 backdrop-blur-md p-1 rounded-xl flex items-center gap-1 w-full border border-white/5 shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
            <button onclick="changeCategoryFilter('all')" id="btn-all" class="flex-1 py-1.5 text-xs font-semibold rounded-lg bg-blue-600 text-white shadow-sm transition duration-200">
                All
            </button>
            <button onclick="changeCategoryFilter('university')" id="btn-university" class="flex-1 py-1.5 text-xs font-medium text-gray-400 hover:text-gray-200 transition duration-200">
                Universities
            </button>
            <button onclick="changeCategoryFilter('career')" id="btn-career" class="flex-1 py-1.5 text-xs font-medium text-gray-400 hover:text-gray-200 transition duration-200">
                Careers
            </button>
            
            <div class="w-px h-4 bg-gray-800/80 mx-0.5 shrink-0"></div>
            
            <button onclick="toggleSearchContainer()" id="btn-toggle-search" class="w-8 h-8 shrink-0 text-gray-400 hover:text-gray-200 hover:bg-white/5 rounded-lg transition duration-200 flex items-center justify-center">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.602 10.602z"></path>
                </svg>
            </button>

            <button onclick="toggleFilterPopover()" id="btn-toggle-popover" class="w-8 h-8 shrink-0 text-gray-400 hover:text-gray-200 hover:bg-white/5 rounded-lg transition duration-200 flex items-center justify-center">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75"></path>
                </svg>
            </button>
        </div>

       <div id="search-container" class="hidden w-full bg-gray-900/85 backdrop-blur-xl p-2 rounded-xl border border-white/5 shadow-[0_20px_40px_rgba(0,0,0,0.6)] flex flex-col gap-1 animate-textFadeIn">
            <div class="flex items-center gap-2 w-full">
                <div class="text-gray-500 pl-1.5">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.602 10.602z"></path>
                    </svg>
                </div>
                <input type="text" id="search-input" oninput="handleSearchInput(this.value)" placeholder="Search station, city or country..." class="w-full bg-transparent text-xs text-white placeholder-gray-500 focus:outline-none pr-2 py-1">
            </div>
            
            <div id="search-suggestions" class="hidden flex flex-col max-h-[180px] overflow-y-auto no-scrollbar border-t border-gray-800/60 mt-1.5 pt-1"></div>
        </div>

        <div id="filter-popover" class="hidden w-full bg-gray-900/85 backdrop-blur-xl p-4 rounded-2xl border border-white/5 shadow-[0_20px_40px_rgba(0,0,0,0.6)] flex flex-col gap-3 animate-textFadeIn">
            <h4 class="text-[10px] font-bold uppercase tracking-widest text-gray-400 border-b border-gray-800/60 pb-1.5">Zusatzfilter</h4>
            
            <label class="flex items-center gap-2.5 cursor-pointer select-none group">
                <input type="checkbox" id="check-tax" onchange="toggleTaxFilter(this.checked)" class="sr-only peer">
                <div class="w-4 h-4 rounded border border-gray-600 bg-gray-950 peer-checked:bg-emerald-500 peer-checked:border-emerald-500 flex items-center justify-center transition-all duration-150 group-hover:border-gray-400">
                    <svg class="w-3 h-3 text-gray-950 stroke-[3.5] hidden peer-checked:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"></path></svg>
                </div>
                <span class="text-xs font-medium text-gray-300 group-hover:text-white transition duration-150">💰 Tax-free Salaries</span>
            </label>

            <div id="tuition-wrapper" class="hidden flex flex-col gap-1.5 mt-1 border-t border-gray-800/40 pt-2.5">
    <div class="flex justify-between items-center text-xs font-medium text-gray-300">
        <span class="flex items-center gap-1">🎓 Max. Tuition:</span>
        <span class="text-blue-400 font-semibold"><span id="cost-label">60.000</span> €</span>
    </div>
    <input 
        type="range" 
        id="cost-slider" 
        min="0" 
        max="60000" 
        step="1000" 
        value="60000" 
        oninput="handleCostSlider(this.value)" 
        class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-blue-500 focus:outline-none"
    >
</div>
        </div>
    </div>

    <div class="absolute bottom-4 left-4 bg-gray-900/50 backdrop-blur-sm p-3 rounded-xl shadow-[0_8px_24px_rgba(0,0,0,0.3)] z-[1000] pointer-events-none hidden md:block">
        <div class="space-y-2">
            <div class="flex items-center gap-2.5">
                <div class="w-2 h-2 rounded-full bg-blue-400 shadow-[0_0_6px_#3b82f6] border border-gray-950"></div>
                <span class="text-[10px] text-gray-400 font-medium tracking-wide">Universities</span>
            </div>
            <div class="flex items-center gap-2.5">
                <div class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_6px_#10b981] border border-gray-950"></div>
                <span class="text-[10px] text-gray-400 font-medium tracking-wide">Careers</span>
            </div>
        </div>
    </div>

    <div id="sidebar" class="fixed bg-gray-900/95 backdrop-blur-xl z-[1010] apple-transition flex flex-col bottom-0 left-0 w-full h-[90vh] rounded-t-3xl shadow-[0_-20px_40px_rgba(0,0,0,0.6)] md:top-0 md:h-full md:w-[440px] md:rounded-none md:shadow-[30px_0_60px_-15px_rgba(0,0,0,0.6)]" style="will-change: transform, opacity; display: none;">
        <div id="touch-zone" class="w-full shrink-0 select-none cursor-grab active:cursor-grabbing touch-none">
            <div class="w-10 h-1 bg-gray-700/60 rounded-full mx-auto mt-3 mb-1 md:hidden"></div>
            <div class="p-6 pt-3 md:pt-6 pb-4 flex justify-between items-start">
                <div>
                    <h1 class="text-xl font-bold text-white tracking-wide">Future Compass</h1>
                    <p class="text-[11px] text-gray-400 mt-0.5">Exploration hub for international studies</p>
                </div>
                <button onclick="closeSidebar()" class="text-gray-400 hover:text-white p-1.5 rounded-xl hover:bg-white/5 transition duration-150">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>
        <div id="details-content" class="px-6 pb-6 flex-1 overflow-y-auto no-scrollbar"></div>
    </div>

    <div id="map" class="w-full h-full absolute inset-0"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="locations.js"></script>

    <script>
        const isMobile = window.innerWidth < 768;
        
        // Globale UI- und Filter-Zustände initialisieren
        let activeMarkers = [];
        let currentSelectedLocation = null;
        let mobileState = 'closed';
        let currentTranslateY = window.innerHeight + 200;

        const currentFilters = {
            category: 'all',
            taxAdvantage: false,
            searchQuery: '',
            maxTuition: 60000 // NEU: Initialer Höchstpreis
        };
        
        // 1. Karte im Dunkelmodus initialisieren
        const map = L.map('map', { 
            zoomControl: false,
            attributionControl: false 
        }).setView([28, isMobile ? 25 : 20], isMobile ? 2 : 3);
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO'
        }).addTo(map);

        // ==========================================
        // INTERAKTIVE LÄNDERGRENZEN (GEOJSON) LOGIK
        // ==========================================
        let geojsonLayer;

        function defaultCountryStyle(feature) {
          return {
            fillColor: "#10b981",
            weight: 1,              
            opacity: 0.2,           
            color: "#10b981",       
            fillOpacity: 0.0        
          };
        }

        function highlightCountry(e) {
          const layer = e.target;
          layer.setStyle({
            weight: 1.5,              
            color: "#10b981",       
            fillOpacity: 0.1        
          });
          if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
            layer.bringToFront();
          }
        }

        function resetCountryStyle(e) {
          if (geojsonLayer) {
            geojsonLayer.resetStyle(e.target);
          }
        }

        function onEachCountryFeature(feature, layer) {
          layer.on({
            mouseover: highlightCountry,
            mouseout: resetCountryStyle,
            click: function(e) {
              map.fitBounds(e.target.getBounds());
              showCountryOverview(feature.properties.name);
            }
          });
        }

        // GeoJSON Grenzen laden
        fetch('./countries.geo.json') 
          .then(response => response.json())
          .then(geoJsonData => {
            geojsonLayer = L.geoJson(geoJsonData, {
              style: defaultCountryStyle,
              onEachFeature: onEachCountryFeature
            }).addTo(map);
            geojsonLayer.bringToBack();
          })
          .catch(error => console.error("Fehler beim Laden der Ländergrenzen:", error));

        // ==========================================
        // DIE DYNAMISCHE LANDES-ÜBERSICHTSMASCHINE
        // ==========================================
        function showCountryOverview(countryName) {
            let searchName = countryName.toLowerCase();
            if (searchName.includes("united states")) searchName = "usa";

            const countryLocations = locations.filter(loc => {
                const matchesCountry = loc.locationName.toLowerCase().includes(searchName);
                const matchesCategory = currentFilters.category === 'all' || loc.category === currentFilters.category;
                const matchesTax = !currentFilters.taxAdvantage || loc.taxAdvantage;
                
                // NEU: Kosten-Check für das Submenü (Ignoriert Jobs)
                const matchesCost = loc.category !== 'university' || !loc.tuitionFee || loc.tuitionFee <= currentFilters.maxTuition;
                
                const matchesSearch = !currentFilters.searchQuery || 
                    loc.name.toLowerCase().includes(currentFilters.searchQuery.toLowerCase()) ||
                    loc.locationName.toLowerCase().includes(currentFilters.searchQuery.toLowerCase());
                
                return matchesCountry && matchesCategory && matchesTax && matchesSearch && matchesCost;
            });

            if (countryLocations.length === 0) {
                detailsContainer.innerHTML = `
                    <div class="animate-textFadeIn">
                        <h2 class="text-xl font-bold text-white tracking-wide">${countryName}</h2>
                        <p class="text-xs text-gray-400 font-medium mt-1 mb-4">No targets mapped yet</p>
                        <p class="text-sm text-gray-400 italic bg-gray-950/40 p-4 rounded-xl leading-relaxed">
                            Für dieses Land sind aktuell keine passenden Universitäten oder Karriere-Stationen mit den gewählten Filtereinstellungen eingetragen.
                        </p>
                    </div>
                `;
                openSidebar();
                return;
            }

            const listHtml = countryLocations.map(loc => {
                const badgeColor = loc.category === 'university' ? 'bg-blue-500/10 text-blue-400' : 'bg-emerald-500/10 text-emerald-400';
                const borderColor = loc.category === 'university' ? 'hover:border-blue-500/40' : 'hover:border-emerald-500/40';
                const typeLabel = loc.category === 'university' ? 'University' : 'Career';
                
                return `
                    <div onclick="showLocationByName('${loc.name.replace(/'/g, "\\'")}')" 
                         class="bg-gray-950/40 p-4 rounded-2xl mb-3 cursor-pointer border border-transparent ${borderColor} transition-all duration-200 shadow-md flex flex-col gap-2 group">
                        <div class="flex justify-between items-start gap-3">
                            <h3 class="text-xs font-semibold text-gray-200 group-hover:text-white transition duration-150 leading-tight">${loc.name}</h3>
                            <span class="px-1.5 py-0.5 text-[8px] font-bold tracking-wider uppercase rounded ${badgeColor} shrink-0">
                                ${typeLabel}
                            </span>
                        </div>
                        <p class="text-[11px] text-gray-400 line-clamp-2 leading-relaxed">${loc.shortInfo.replace(/•/g, '·')}</p>
                    </div>
                `;
            }).join('');

            detailsContainer.innerHTML = `
                <div class="animate-textFadeIn">
                    <h2 class="text-xl font-bold text-white tracking-wide">${countryName}</h2>
                    <p class="text-xs text-gray-400 font-medium mt-0.5 mb-5">${countryLocations.length} Stationen verfügbar</p>
                    <div class="flex flex-col gap-1">
                        ${listHtml}
                    </div>
                </div>
            `;
            
            openSidebar();
            detailsContainer.scrollTop = 0;
        }

        window.showLocationByName = function(name) {
            const loc = locations.find(l => l.name === name);
            if (loc) {
                showDetails(loc);
            }
        };

      function renderMarkers() {
            // Erst alle alten Marker von der Karte löschen
            activeMarkers.forEach(marker => map.removeLayer(marker));
            activeMarkers = [];

            locations.forEach(loc => {
                // 1. Filter: Kategorie (All / Uni / Career)
                if (currentFilters.category !== 'all' && loc.category !== currentFilters.category) {
                    return; 
                }

                // 2. Filter: Steuerfreie Gehälter
                if (currentFilters.taxAdvantage && !loc.taxAdvantage) {
                    return; 
                }

                // 3. Filter: Kosten-Slider (Prüft NUR Unis, falls sie teurer sind als der Regler)
                if (loc.category === 'university' && loc.tuitionFee && loc.tuitionFee > currentFilters.maxTuition) {
                    return; 
                }

                // 4. Filter: Suchfeld-Eingabe
                if (currentFilters.searchQuery) {
                    const query = currentFilters.searchQuery.toLowerCase();
                    const inName = loc.name.toLowerCase().includes(query);
                    const inLocation = loc.locationName.toLowerCase().includes(query);
                    
                    if (!inName && !inLocation) {
                        return; // Überspringen, wenn das Wort nirgends vorkommt
                    }
                }

                // --- AB HIER WIRD DER MARKER GEZEICHNET ---
                const innerDotColor = loc.category === 'university' ? 'bg-blue-400 shadow-[0_0_8px_#3b82f6]' : 'bg-emerald-400 shadow-[0_0_8px_#10b981]';
                const outerRingColor = loc.category === 'university' ? 'bg-blue-500/20' : 'bg-emerald-500/20';
                
                const neonIcon = L.divIcon({
                    html: `
                        <div class="relative w-5 h-5 flex items-center justify-center">
                            <div class="absolute w-full h-full rounded-full ${outerRingColor} animate-ping" style="animation-duration: 4s;"></div>
                            <div class="w-2 h-2 rounded-full ${innerDotColor} border border-gray-950 z-10"></div>
                        </div>
                    `,
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });

                const marker = L.marker(loc.coordinates, { icon: neonIcon }).addTo(map);
                marker.bindTooltip(loc.name, { direction: 'top', offset: [0, -8] });

                marker.on('click', () => {
                    showDetails(loc);
                    if(window.innerWidth < 768) {
                        map.panTo([loc.coordinates[0] - 1.2, loc.coordinates[1]], { animate: true, duration: 0.6 });
                    } else {
                        map.panTo([loc.coordinates[0], loc.coordinates[1] - 4], { animate: true, duration: 0.6 });
                    }
                });

                activeMarkers.push(marker);
            });
        }

      function changeCategoryFilter(category) {
            currentFilters.category = category; 
            
            // === NEU: SLIDER EIN- ODER AUSBLENDEN ===
            const tuitionWrapper = document.getElementById('tuition-wrapper');
            if (tuitionWrapper) {
                if (category === 'university') {
                    tuitionWrapper.classList.remove('hidden'); // Zeigen bei Unis
                } else {
                    tuitionWrapper.classList.add('hidden');    // Verstecken bei All & Career
                    
                    // Filter im Hintergrund zurücksetzen, wenn man den Tab verlässt
                    currentFilters.maxTuition = 60000;
                    const slider = document.getElementById('cost-slider');
                    if (slider) slider.value = 60000;
                    const label = document.getElementById('cost-label');
                    if (label) label.textContent = "60.000";
                }
            }
            // =========================================
            
            const buttons = ['all', 'university', 'career'];
            buttons.forEach(btn => {
                const el = document.getElementById(`btn-${btn}`);
                if (el) el.className = "flex-1 py-1.5 text-xs font-medium text-gray-400 hover:text-gray-200 transition duration-200";
            });
            const activeColor = category === 'career' ? 'bg-emerald-600' : 'bg-blue-600';
            const targetBtn = document.getElementById(`btn-${category}`);
            if (targetBtn) {
                targetBtn.className = `flex-1 py-1.5 text-xs font-semibold rounded-lg ${activeColor} text-white shadow-sm transition duration-200`;
            }

            closeSidebar(); 
            renderMarkers(); 
        }

        // NEU: Event-Maschine für den Slider-Input
        function handleCostSlider(value) {
            const parsedVal = parseInt(value);
            currentFilters.maxTuition = parsedVal;
            
            // Text-Label im Popover live formatieren (60000 -> 60.000)
            document.getElementById('cost-label').textContent = parsedVal.toLocaleString('de-DE');
            
            // Filter live auf Karte und offene Listen anwenden
            renderMarkers();
            if (currentSelectedLocation === null && sidebar.style.display === 'flex' && window.innerWidth >= 768) {
                // Falls gerade eine Landesübersicht offen ist, diese live mitsortieren
                const heading = detailsContainer.querySelector('h2');
                if (heading) showCountryOverview(heading.textContent);
            }
        }

        function toggleFilterPopover() {
            const popover = document.getElementById('filter-popover');
            const btn = document.getElementById('btn-toggle-popover');
            
            if (popover.classList.contains('hidden')) {
                popover.classList.remove('hidden');
                btn.classList.add('bg-white/10', 'text-white');
            } else {
                popover.classList.add('hidden');
                btn.classList.remove('bg-white/10', 'text-white');
            }
        }

        function toggleSearchContainer() {
            const searchContainer = document.getElementById('search-container');
            const btn = document.getElementById('btn-toggle-search');
            const input = document.getElementById('search-input');
            const suggestions = document.getElementById('search-suggestions');
            
            if (searchContainer.classList.contains('hidden')) {
                searchContainer.classList.remove('hidden');
                btn.classList.add('bg-white/10', 'text-white');
                document.getElementById('filter-popover').classList.add('hidden');
                document.getElementById('btn-toggle-popover').classList.remove('bg-white/10', 'text-white');
                setTimeout(() => input.focus(), 50);
            } else {
                searchContainer.classList.add('hidden');
                btn.classList.remove('bg-white/10', 'text-white');
                input.value = '';
                suggestions.innerHTML = '';
                suggestions.classList.add('hidden');
                handleSearchInput('');
            }
        }

        function handleSearchInput(value) {
            const query = value.trim().toLowerCase();
            currentFilters.searchQuery = value.trim();
            const suggestionsContainer = document.getElementById('search-suggestions');
            
            if (!query) {
                suggestionsContainer.innerHTML = '';
                suggestionsContainer.classList.add('hidden');
                renderMarkers();
                return;
            }

            let suggestionsHtml = '';
            let hasMatches = false;

            const uniqueCountries = [...new Set(locations.map(loc => {
                const parts = loc.locationName.split(',');
                return parts[parts.length - 1].trim();
            }))];

            const matchedCountries = uniqueCountries.filter(c => c.toLowerCase().includes(query)).slice(0, 2);
            
            if (matchedCountries.length > 0) {
                hasMatches = true;
                matchedCountries.forEach(country => {
                    suggestionsHtml += `
                        <div onclick="clickCountrySuggestion('${country.replace(/'/g, "\\'")}')" 
                             class="flex justify-between items-center px-2 py-1.5 rounded-lg hover:bg-white/5 cursor-pointer transition duration-150 group bg-emerald-500/5 mb-1 border border-emerald-500/10">
                            <div class="flex flex-col min-w-0">
                                <span class="text-xs text-emerald-400 group-hover:text-emerald-300 font-semibold truncate">Explore ${country}</span>
                                <span class="text-[9px] text-gray-500">View all regional opportunities</span>
                            </div>
                            <span class="text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded bg-emerald-500/20 text-emerald-400 shrink-0">
                                🌍 Country
                            </span>
                        </div>
                    `;
                });
            }

            const matchedLocations = locations.filter(loc => 
                loc.name.toLowerCase().includes(query) || 
                loc.locationName.toLowerCase().includes(query)
            ).slice(0, 4);

            if (matchedLocations.length > 0) {
                hasMatches = true;
                suggestionsHtml += matchedLocations.map(loc => {
                    const badgeStyle = loc.category === 'university' ? 'bg-blue-500/10 text-blue-400' : 'bg-emerald-500/10 text-emerald-400';
                    const label = loc.category === 'university' ? 'Uni' : 'Job';
                    
                    return `
                        <div onclick="clickSearchSuggestion('${loc.name.replace(/'/g, "\\'")}')" 
                             class="flex justify-between items-center px-2 py-1.5 rounded-lg hover:bg-white/5 cursor-pointer transition duration-150 group">
                            <div class="flex flex-col min-w-0 pr-2">
                                <span class="text-xs text-gray-200 group-hover:text-white font-medium truncate">${loc.name}</span>
                                <span class="text-[10px] text-gray-500 group-hover:text-gray-400 truncate">${loc.locationName}</span>
                            </div>
                            <span class="text-[9px] font-bold uppercase tracking-wider px-1 py-0.5 rounded ${badgeStyle} shrink-0">
                                ${label}
                            </span>
                        </div>
                    `;
                }).join('');
            }

            if (!hasMatches) {
                suggestionsContainer.innerHTML = '<div class="text-[10px] text-gray-500 px-2 py-2 italic">No targets found</div>';
                suggestionsContainer.classList.remove('hidden');
            } else {
                suggestionsContainer.innerHTML = suggestionsHtml;
                suggestionsContainer.classList.remove('hidden');
            }

            renderMarkers();
        }

        function clickSearchSuggestion(name) {
            const loc = locations.find(l => l.name === name);
            if (loc) {
                document.getElementById('search-input').value = loc.name;
                currentFilters.searchQuery = loc.name;
                document.getElementById('search-suggestions').classList.add('hidden');
                
                renderMarkers();
                showDetails(loc);
                
                if (window.innerWidth < 768) {
                    map.panTo([loc.coordinates[0] - 1.2, loc.coordinates[1]], { animate: true, duration: 0.6 });
                } else {
                    map.panTo([loc.coordinates[0], loc.coordinates[1] - 4], { animate: true, duration: 0.6 });
                }
            }
        }

        function clickCountrySuggestion(countryName) {
            document.getElementById('search-input').value = countryName;
            currentFilters.searchQuery = countryName;
            document.getElementById('search-suggestions').classList.add('hidden');
            
            renderMarkers();
            showCountryOverview(countryName);
            
            if (geojsonLayer) {
                let targetLayer = null;
                let searchName = countryName.toLowerCase();
                if (searchName === 'usa') searchName = 'united states';
                
                geojsonLayer.eachLayer(layer => {
                    if (layer.feature.properties && layer.feature.properties.name && 
                        layer.feature.properties.name.toLowerCase().includes(searchName)) {
                        targetLayer = layer;
                    }
                });
                
                if (targetLayer) {
                    map.fitBounds(targetLayer.getBounds(), { animate: true, duration: 1.0 });
                }
            }
        }
       
        // ==========================================
        // SYSTEMFUNKTIONEN (SIDEBAR-STEUERUNG & PARSER)
        // ==========================================
        const sidebar = document.getElementById('sidebar');
        const detailsContainer = document.getElementById('details-content');
        const touchZone = document.getElementById('touch-zone');
        
        L.DomEvent.disableClickPropagation(sidebar);
        L.DomEvent.disableScrollPropagation(sidebar);

        function getSheetPositions() {
            const viewHeight = window.innerHeight;
            return {
                expanded: 0,
                partial: viewHeight * 0.35,
                closed: viewHeight + 200
            };
        }

        function snapToState(state) {
            mobileState = state;
            sidebar.classList.add('apple-transition');
            const positions = getSheetPositions();
            currentTranslateY = positions[state];
            
            if (state === 'closed') {
                sidebar.style.opacity = '0';
                sidebar.style.pointerEvents = 'none';
                sidebar.style.transform = `translateY(120vh)`;
                setTimeout(() => {
                    if (mobileState === 'closed') sidebar.style.display = 'none';
                }, 450);
            } else {
                sidebar.style.display = 'flex';
                sidebar.offsetHeight; 
                sidebar.style.opacity = '1';
                sidebar.style.pointerEvents = 'auto';
                sidebar.style.transform = `translateY(${currentTranslateY}px)`;
                
                if (window.innerWidth < 768) {
                    if (state === 'partial') {
                        detailsContainer.style.overflowY = 'hidden';
                    } else if (state === 'expanded') {
                        detailsContainer.style.overflowY = 'auto';
                    }
                } else {
                    detailsContainer.style.overflowY = 'auto';
                }
            }
        }

        function resetMapView() {
            const mobileMode = window.innerWidth < 768;
            map.flyTo([28, mobileMode ? 25 : 20], mobileMode ? 2 : 3, {
                animate: true,
                duration: 1.0
            });
        }

        function closeSidebar() {
            if (window.innerWidth < 768) {
                snapToState('closed');
            } else {
                sidebar.classList.add('apple-transition');
                sidebar.style.transform = 'translateX(-100%)';
                setTimeout(() => {
                    if (!currentSelectedLocation) sidebar.style.display = 'none';
                }, 450);
            }
            currentSelectedLocation = null;
            resetMapView(); 
        }

        function openSidebar() {
            sidebar.style.display = 'flex';
            sidebar.offsetHeight; 
            sidebar.classList.add('apple-transition');
            
            if (window.innerWidth < 768) {
                snapToState('partial');
            } else {
                sidebar.style.transform = 'translateX(0)';
            }
        }

        // TOUCH GESTEN
        let startY = 0;
        let startTranslateY = 0;
        let isDragging = false;

        sidebar.addEventListener('touchstart', (e) => {
            if (window.innerWidth >= 768 || mobileState === 'closed') return;
            const isTouchZone = touchZone.contains(e.target);
            const isContentZone = detailsContainer.contains(e.target);
            
            if (mobileState === 'partial' || isTouchZone || (mobileState === 'expanded' && isContentZone && detailsContainer.scrollTop <= 0)) {
                isDragging = true;
                sidebar.classList.remove('apple-transition');
                startY = e.touches[0].clientY;
                startTranslateY = currentTranslateY;
            }
        }, { passive: false });

        sidebar.addEventListener('touchmove', (e) => {
            if (window.innerWidth >= 768 || mobileState === 'closed') return;
            const currentY = e.touches[0].clientY;
            const deltaY = currentY - startY;
            const isContentZone = detailsContainer.contains(e.target);

            if (isDragging && mobileState === 'expanded' && isContentZone && deltaY < 0) {
                isDragging = false;
                sidebar.classList.add('apple-transition');
                snapToState('expanded');
                return;
            }

            if (isDragging) {
                if (e.cancelable) e.preventDefault(); 
                let newTranslateY = startTranslateY + deltaY;
                if (newTranslateY < 0) newTranslateY = newTranslateY * 0.25;
                currentTranslateY = newTranslateY;
                sidebar.style.transform = `translateY(${newTranslateY}px)`;
            }
        }, { passive: false });

        sidebar.addEventListener('touchend', (e) => {
            if (!isDragging || window.innerWidth >= 768) return;
            isDragging = false;
            const positions = getSheetPositions();
            const distanceToExpanded = Math.abs(currentTranslateY - positions.expanded);
            const distanceToPartial = Math.abs(currentTranslateY - positions.partial);
            const distanceToClosed = Math.abs(currentTranslateY - positions.closed);
            const minDistance = Math.min(distanceToExpanded, distanceToPartial, distanceToClosed);
            
            if (minDistance === distanceToExpanded) {
                snapToState('expanded');
            } else if (minDistance === distanceToPartial) {
                snapToState('partial');
            } else {
                snapToState('closed');
                currentSelectedLocation = null;
                resetMapView(); 
            }
        });

        function formatTabContent(text, category) {
            if (!text) return '';
            const sections = text.split('\n\n');
            const accentColor = category === 'university' ? 'text-blue-400' : 'text-emerald-400';
            const bulletColor = category === 'university' ? 'bg-blue-500' : 'bg-emerald-500';
            
            return sections.map(section => {
                const lines = section.trim().split('\n');
                if (lines.length === 0 || !lines[0]) return '';
                
                let title = lines[0].trim();
                title = title.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD00-\uDFFF]/g, '').trim();
                
                const contentLines = lines.slice(1).map(line => {
                    let formattedLine = line.trim();
                    if (formattedLine.startsWith('•')) {
                        formattedLine = formattedLine.substring(1).trim();
                        if (formattedLine.includes(':')) {
                            const parts = formattedLine.split(':');
                            const label = parts[0].trim();
                            const desc = parts.slice(1).join(':').trim();
                            return `
                                <div class="flex items-start gap-2.5 text-gray-300 text-[13px] leading-relaxed">
                                    <span class="w-1 h-1 rounded-full ${bulletColor} mt-2 shrink-0 block"></span>
                                    <span><strong class="text-white font-medium">${label}:</strong> ${desc}</span>
                                </div>`;
                        }
                        return `
                            <div class="flex items-start gap-2.5 text-gray-300 text-[13px] leading-relaxed">
                                <span class="w-1 h-1 rounded-full ${bulletColor} mt-2 shrink-0 block"></span>
                                <span>${formattedLine}</span>
                            </div>`;
                    }
                    return `<p class="text-gray-400 text-[12px] pl-3.5 leading-relaxed italic">${formattedLine}</p>`;
                }).join('');
                
                return `
                    <div class="bg-gray-950/30 p-4 rounded-2xl mb-3 last:mb-0 flex flex-col gap-3 shadow-inner">
                        <h4 class="text-[9px] font-bold uppercase tracking-widest ${accentColor}">${title}</h4>
                        <div class="flex flex-col gap-2">${contentLines}</div>
                    </div>
                `;
            }).join('');
        }

        function switchTab(tabName) {
            if (!currentSelectedLocation) return;
            document.querySelectorAll('.tab-pane').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-content-${tabName}`).classList.remove('hidden');

            const tabs = ['req', 'proc', 'fund'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-btn-${t}`);
                if (btn) btn.className = "flex-1 py-1.5 rounded-lg text-center text-xs font-medium text-gray-400 hover:text-gray-200 transition-all duration-150";
            });

            const activeBtn = document.getElementById(`tab-btn-${tabName}`);
            if (activeBtn) {
                const activeStyle = currentSelectedLocation.category === 'university' ? 'bg-blue-600 text-white shadow-sm font-semibold' : 'bg-emerald-600 text-white shadow-sm font-semibold';
                activeBtn.className = `flex-1 py-1.5 rounded-lg text-center text-xs ${activeStyle} transition-all duration-150`;
            }
        }

        function showDetails(loc) {
            currentSelectedLocation = loc;
            const badgeColor = loc.category === 'university' ? 'bg-blue-500/10 text-blue-400' : 'bg-emerald-500/10 text-emerald-400';
            const badgeLabel = loc.category === 'university' ? 'University Track' : 'Career Pathway';
            const initialActiveTabStyle = loc.category === 'university' ? 'bg-blue-600 text-white shadow-sm font-semibold' : 'bg-emerald-600 text-white shadow-sm font-semibold';

            detailsContainer.innerHTML = `
                <div class="flex flex-col h-full animate-textFadeIn">
                    <span class="inline-block px-2.5 py-0.5 text-[10px] font-bold tracking-wider uppercase rounded-md ${badgeColor} self-start mb-3">
                        ${badgeLabel}
                    </span>
                    <h2 class="text-xl font-bold text-white tracking-wide leading-tight">${loc.name}</h2>
                    <p class="text-xs text-gray-400 font-medium mt-0.5 mb-4">${loc.locationName || ''}</p>
                    <div class="p-4 bg-gray-950/40 rounded-xl text-xs text-gray-300 leading-relaxed mb-5">
                        ${loc.shortInfo}
                    </div>
                    <div class="flex bg-gray-950/60 p-1 rounded-xl gap-1 mb-4 shrink-0">
                        <button onclick="switchTab('req')" id="tab-btn-req" class="flex-1 py-1.5 rounded-lg text-center text-xs ${initialActiveTabStyle} transition-all duration-150">
                            Requirements
                        </button>
                        <button onclick="switchTab('proc')" id="tab-btn-proc" class="flex-1 py-1.5 rounded-lg text-center text-xs font-medium text-gray-400 hover:text-gray-200 transition-all duration-150">
                            Process
                        </button>
                        <button onclick="switchTab('fund')" id="tab-btn-fund" class="flex-1 py-1.5 rounded-lg text-center text-xs font-medium text-gray-400 hover:text-gray-200 transition-all duration-150">
                            Funding
                        </button>
                    </div>
                    <div id="tab-content-req" class="tab-pane p-0.5">
                        ${formatTabContent(loc.requirements, loc.category)}
                    </div>
                    <div id="tab-content-proc" class="tab-pane hidden p-0.5">
                        ${formatTabContent(loc.process, loc.category)}
                    </div>
                    <div id="tab-content-fund" class="tab-pane hidden p-0.5">
                        ${formatTabContent(loc.logistics, loc.category)}
                    </div>
                </div>
            `;
            openSidebar();
            detailsContainer.scrollTop = 0;
        }

        // INITIALISIERUNG STARTEN
        if (window.innerWidth >= 768) {
            sidebar.style.transform = 'translateX(-100%)';
            sidebar.style.opacity = '1';
            sidebar.style.pointerEvents = 'auto';
            sidebar.style.display = 'flex';
        } else {
            sidebar.style.transform = `translateY(120vh)`;
            sidebar.style.opacity = '0';
            sidebar.style.pointerEvents = 'none';
            sidebar.style.display = 'none';
        }

        // Marker initial zeichnen
        renderMarkers();
        
        window.addEventListener('resize', () => {
            map.invalidateSize();
            if (window.innerWidth >= 768) {
                sidebar.style.opacity = '1';
                sidebar.style.pointerEvents = 'auto';
                sidebar.style.display = 'flex';
                sidebar.style.transform = currentSelectedLocation ? 'translateX(0)' : 'translateX(-100%)';
            } else {
                snapToState(mobileState);
            }
        });
    </script>
</body>
</html>
